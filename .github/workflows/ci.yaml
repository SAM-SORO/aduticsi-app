name: ADUTI CI/CD

# Déclenchement du workflow sur les branches dev et main
on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build-and-lint:
    name: Build & Lint (Verification)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: ESLint check (Next.js)
        run: pnpm exec next lint

      # Pour vérifier que l'app compile bien en production sans erreurs
      - name: Build project
        run: pnpm exec next build
        env:
          # On peut mocker les URLs côté Action pour le build statique
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          POOLED_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"

      - name: Build Docker image (CI validation)
        run: |
          docker build \
            --build-arg DATABASE_URL="postgresql://postgres:postgres@localhost:5432/postgres" \
            --build-arg DIRECT_URL="postgresql://postgres:postgres@localhost:5432/postgres" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="https://example.supabase.co" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="anon-placeholder" \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="turnstile-placeholder" \
            -t aduti-app:ci .

  auto-merge-to-main:
    name: Auto-merge to Main
    needs: build-and-lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/dev' && contains(github.event.head_commit.message, '[deploy]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev into main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/dev --ff-only
          git push origin main

  deploy:
    name: Deploy to Coolify
    needs: [build-and-lint, auto-merge-to-main]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    # S'exécute sur main après le merge auto, ou directement si push sur main avec [deploy]
    if: |
      always() && 
      (github.ref == 'refs/heads/main' || needs.auto-merge-to-main.result == 'success') &&
      contains(github.event.head_commit.message, '[deploy]')

    steps:
      - name: Trigger Coolify Webhook
        run: |
          echo "🚀 Initialisation du webhook de déploiement Coolify..."
          curl --request GET '${{ secrets.COOLIFY_WEBHOOK_URL }}'
          echo "✅ Signal de déploiement envoyé à Coolify avec succès!"
