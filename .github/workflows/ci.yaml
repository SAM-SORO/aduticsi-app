name: ADUTI CI/CD

# Déclenchement du workflow sur les branches dev et main
on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build-and-lint:
    name: Build & Lint (Verification)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: ESLint check (Next.js)
        run: pnpm exec next lint

      # Pour vérifier que l'app compile bien en production sans erreurs
      - name: Build project
        run: pnpm exec next build
        env:
          # On peut mocker les URLs côté Action pour le build statique
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          POOLED_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"

      - name: Build Docker image (CI validation)
        run: |
          docker build \
            --build-arg DATABASE_URL="postgresql://postgres:postgres@localhost:5432/postgres" \
            --build-arg DIRECT_URL="postgresql://postgres:postgres@localhost:5432/postgres" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="https://example.supabase.co" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="anon-placeholder" \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="turnstile-placeholder" \
            -t aduti-app:ci .

  deploy:
    name: Deploy to Coolify
    needs: build-and-lint
    runs-on: ubuntu-latest
    
    # 🔴 DIRECTIVE DE PUSH EN PRODUCTION:
    # Ce job s'exécute UNIQUEMENT sur la branche `main` ET UNIQUEMENT 
    # si le message de commit contient la directive "prod[deploy]"
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'prod[deploy]')

    steps:
      - name: Trigger Coolify Webhook
        run: |
          echo "🚀 Initialisation du webhook de déploiement Coolify..."
          
          # Appelez l'URL du Webhook fournie par votre dashboard Coolify
          # Exemple avec CURL pour un Webhook standard de Coolify :
          curl --request GET '${{ secrets.COOLIFY_WEBHOOK_URL }}'
          
          echo "✅ Signal de déploiement envoyé à Coolify avec succès!"
